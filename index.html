<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login - UPTM Queue Management</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="header">
                <div class="logo"><img src="images/logo.png" alt="UPTM Logo"></div>
                <h2>Bursary Smart Queue Management System</h2>
                <p>Staff Authentication Portal</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Staff Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="staff@uptm.edu.my" 
                        required
                        autocomplete="email">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="Enter your password" 
                            required
                            autocomplete="current-password">
                        <button type="button" id="togglePassword" class="toggle-password">
                            <i class="ri-eye-fill"></i>
                        </button>
                    </div>
                </div>

                <div id="error-message" class="error-message"></div>

                <button type="submit" id="loginBtn" class="btn-primary">
                    Login
                </button>
            </form>

            <div class="footer">
                <p>Final Year Project 2025/2026</p>
                <p>Universiti Poly-Tech Malaysia (UPTM)</p>
            </div>
        </div>
    </div>

    <!-- FIREBASE SDKs - REALTIME DATABASE -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC2mr_mcnjwujkUs0BaIthRKzLbjheeFsU",
            authDomain: "uptm-smartqueue.firebaseapp.com",
            databaseURL: "https://uptm-smartqueue-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "uptm-smartqueue",
            storageBucket: "uptm-smartqueue.firebasestorage.app",
            messagingSenderId: "750707323311",
            appId: "1:750707323311:web:d0289dab0557d3864f3f5a"
        };

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const database = firebase.database();

// DOM Elements
const loginForm = document.getElementById('loginForm');
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const loginBtn = document.getElementById('loginBtn');
const errorMessage = document.getElementById('error-message');
const togglePasswordBtn = document.getElementById('togglePassword');

// 🔥 FORCE CLEAN SESSION ON LOGIN PAGE
(async function cleanSession() {
    try {
        // Clear localStorage
        localStorage.removeItem('currentStaffId');
        localStorage.removeItem('currentCounter');
        localStorage.removeItem('staffName');
        localStorage.removeItem('staffEmail');
        
        // Force signout any existing Firebase session
        await auth.signOut();
        console.log('✅ Session cleaned');
    } catch (error) {
        console.log('No previous session');
    }
})();

// Toggle Password Visibility
togglePasswordBtn.addEventListener('click', () => {
    const type = passwordInput.getAttribute('type');
    const icon = togglePasswordBtn.querySelector('i');
    
    if (type === 'password') {
        passwordInput.setAttribute('type', 'text');
        icon.classList.remove('ri-eye-fill');
        icon.classList.add('ri-eye-off-fill');
    } else {
        passwordInput.setAttribute('type', 'password');
        icon.classList.remove('ri-eye-off-fill');
        icon.classList.add('ri-eye-fill');
    }
});

// Login Handler
loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideError();
    
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    
    if (!email || !password) {
        showError("Please fill in all fields");
        return;
    }
    
    loginBtn.disabled = true;
    loginBtn.textContent = "Logging in...";
    
    try {
        // Step 1: Login with Firebase Auth
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        const user = userCredential.user;
        
        console.log("✅ Auth successful:", user.uid);
        
        // Step 2: Check Realtime Database for staff data
        const staffRef = database.ref('staff');
        const staffSnapshot = await staffRef.orderByChild('email').equalTo(email).once('value');
        
        if (!staffSnapshot.exists()) {
            // Staff not found in database
            await auth.signOut();
            throw new Error('Staff not found in database. Please contact admin.');
        }
        
        const staffData = Object.values(staffSnapshot.val())[0];
        const staffId = Object.keys(staffSnapshot.val())[0];
        
        console.log("✅ Staff found:", staffId, staffData);
        
        // Step 3: Update status to online
        await database.ref(`staff/${staffId}`).update({
            status: 'online',
            lastLogin: firebase.database.ServerValue.TIMESTAMP
        });
        
        // Step 4: Save staffId to localStorage
        localStorage.setItem('currentStaffId', staffId);
        localStorage.setItem('currentCounter', staffData.counter);
        localStorage.setItem('staffName', staffData.name);
        localStorage.setItem('staffEmail', staffData.email);
        
        console.log("✅ Login complete, redirecting...");
        
        // Redirect to dashboard
        window.location.href = "dashboard.html";
        
    } catch (error) {
        console.error("❌ Login error:", error);
        
        let errorMsg = "Login failed. Please try again.";
        
        switch (error.code) {
            case 'auth/invalid-email':
                errorMsg = "Invalid email address format";
                break;
            case 'auth/user-not-found':
                errorMsg = "No account found with this email";
                break;
            case 'auth/wrong-password':
                errorMsg = "Incorrect password";
                break;
            case 'auth/invalid-credential':
                errorMsg = "Invalid email or password";
                break;
            case 'auth/too-many-requests':
                errorMsg = "Too many failed attempts. Please try again later.";
                break;
            default:
                errorMsg = error.message;
        }
        
        showError(errorMsg);
        loginBtn.disabled = false;
        loginBtn.textContent = "Login";
    }
});

function showError(message) {
    errorMessage.textContent = message;
    errorMessage.classList.add('show');
}

function hideError() {
    errorMessage.textContent = "";
    errorMessage.classList.remove('show');
}
    </script>
</body>
</html>
